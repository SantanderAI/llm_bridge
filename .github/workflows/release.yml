#
# Release packaging. llm_bridge is distributed as a Python package, so on a
# published GitHub Release this workflow builds the sdist + wheel and attaches
# them to the release as downloadable assets.
#
# To publish to PyPI as well, configure Trusted Publishing for this repo on
# PyPI and uncomment the `pypi-publish` job below (no API token required).

name: Release

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write  # required to upload the release asset
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
        with:
          python-version: "3.11"
      - name: Build
        run: |
          python -m pip install --upgrade pip build
          python -m build
          ls -l dist
      - name: Upload artifacts as workflow artifact
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882  # v4.4.3
        with:
          name: dist
          path: dist/
      - name: Attach artifacts to the GitHub Release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/* --clobber

