name: Bug report
description: Report a problem with llm_bridge
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please do **not** include any
        secrets, API keys, internal URLs, or proprietary content in this report.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of the bug.
      placeholder: When I call `create_llm({"provider": "..."})`, it ...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal code so we can reproduce the issue.
      render: python
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Release tag or commit SHA you are running.
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider
      description: Which provider were you using?
      options:
        - mock (offline)
        - callable (bring your own)
        - openai
        - bedrock / aws
        - google / gemini
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any error output (redact endpoints, keys, and sensitive data).
      render: shell
